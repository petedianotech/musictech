name: Build Musictech App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Configure Keystore
      env:
        KEYSTORE_PASSWORD_SECRET: ${{ secrets.STORE_PASSWORD }}
        KEY_PASSWORD_SECRET: ${{ secrets.KEY_PASSWORD }}
      run: |
        if [ -n "$KEYSTORE_PASSWORD_SECRET" ]; then
          echo "Using production secrets for signing..."
          echo "STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          # If the keystore is base64 encoded in secrets, decode it
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > my-upload-key.jks
            echo "KEYSTORE_PATH=../my-upload-key.jks" >> $GITHUB_ENV
          fi
        else
          echo "No signing secrets found. Generating dynamic self-signed keys for a ready-to-use release build..."
          keytool -genkey -v \
            -keystore my-upload-key.jks \
            -alias upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "musictechPass" \
            -keypass "musictechPass" \
            -dname "CN=Musictech, OU=AI, O=Musictech, L=City, S=State, C=US"
          
          echo "STORE_PASSWORD=musictechPass" >> $GITHUB_ENV
          echo "KEY_PASSWORD=musictechPass" >> $GITHUB_ENV
          echo "KEYSTORE_PATH=../my-upload-key.jks" >> $GITHUB_ENV
        fi

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build with Gradle
      run: gradle assembleRelease assembleDebug

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: musictech-release-apk
        path: app/build/outputs/apk/release/app-release.apk

    - name: Upload Debug APK (Alternative)
      uses: actions/upload-artifact@v4
      with:
        name: musictech-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
